<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthbound Party Menu - Fixed Sizing</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            background-color: #040404;
            min-height: 100vh;
            max-height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', monospace;
        }

        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            width: 60%;
            background-color: #000;
            background-image: url("motherbattlebg.gif");
            background-repeat: no-repeat;
            background-size: 100%;
            background-position: center;
            border: 7.5px solid #989d8c;
            border-radius: 18px;
            outline: 3px solid #f0f1e8;
            outline-offset: -5.25px;
            box-sizing: border-box;
        }

        .party-container {
            display: flex;
            flex-wrap: nowrap;
            gap: 9px;
            margin-bottom: 37.5px;
        }

        .earthbound-menu {
            position: relative;
            background: repeating-conic-gradient(
                    #8880d9 0% 25%,
                    #a491e8 0% 50%
            ) 50% / 24px 24px;

            border: 7.5px solid #989d8c;
            border-radius: 18px;
            outline: 3px solid #f0f1e8;
            outline-offset: -5.25px;
            padding: 15px 15px;
            width: 157.5px;
            margin: 0;
            box-sizing: border-box;
        }

        .character-name {
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;

            background-color: #000;
            border-radius: 0px 0px 4.5px 4.5px;

            color: #f7f5fd;
            font-size: 15px;
            padding: 3px;
            margin: 0 auto;
            letter-spacing: 0px;
        }

        .stat-box {
            background: linear-gradient(to bottom, #010100 50%, #1a1227 50%);
            border-radius: 6px;
            margin-bottom: 7.5px;

            height: 67.5px;
            width: 100%;
            position: relative;
        }

        .stat-box:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            position: absolute;
            top: 6px;
            left: 6px;
            color: #fff;
            font-size: 6px;
        }

        .current {
            position: absolute;
            top: 4.5px;
            left: 1.5px;
            width: 100%;
            text-align: center;

            font-family: 'VT323', monospace;
            font-size: 57px;
            color: #f7f5fd;
            letter-spacing: 3px;
            line-height: 1;
        }

        .max {
            position: absolute;
            bottom: 3px;
            right: 3px;

            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: #b0b0b0;
        }

        .active-character {
            transform: translateY(-37.5px);
        }

        .enemy-sprite {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #enemy-sprite-img {
            width: 120px;
        }

        #action-menu {
            position: absolute;
            top: 30px;
            left: 30px;

            background-color: #1a1227;
            border: 7.5px solid #989d8c;
            border-radius: 18px;
            outline: 3px solid #f0f1e8;
            outline-offset: -5.25px;
            padding: 22.5px;
            color: white;
            min-width: 225px;
            min-height: 150px;
            box-sizing: border-box;
            font-size: 18px;
        }

        .action-btn {
            background-color: transparent;
            border: none;
            top: -15px;
            font-size: 12px;
            font-family: 'Press Start 2P', monospace;
            color: white;
            padding: 0;
            cursor: pointer;
        }

        .action-btn:hover {
            text-decoration: underline;
        }

        #action-log {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);

            background-color: #1a1227;
            border: 7.5px solid #989d8c;
            border-radius: 18px;
            outline: 3px solid #f0f1e8;
            outline-offset: -5.25px;
            padding: 22.5px;
            color: white;
            min-width: 225px;
            min-height: 150px;
            box-sizing: border-box;
            font-size: 16px;
        }

    </style>
</head>
<body>
<div id="game-container">
    <div id="action-menu">
        <p class="character-name" id="action-name">Placeholder</p>
        <button id="btn-bash" class="action-btn">Bash</button><br><br>
        <button id="btn-defend" class="action-btn">Defend</button><br><br>
        <button id="btn-psi" class="action-btn">PSI</button><br><br>
    </div>

    <div id="action-log">
        Placeholder used placeholder move!
    </div>

    <div class="enemy-sprite">
        <img id="enemy-sprite-img" src="enemysprite.png">
    </div>

    <div class="party-container">
        <fieldset class="earthbound-menu">
            <legend class="character-name">Ness</legend>
            <div class="stat-box">
                <span class="stat-label">HP</span>
                <span class="current">388</span>
                <span class="max">/389</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">PP</span>
                <span class="current">062</span>
                <span class="max">/184</span>
            </div>
        </fieldset>

        <fieldset class="earthbound-menu active-character">
            <legend class="character-name">Paula</legend>
            <div class="stat-box">
                <span class="stat-label">HP</span>
                <span class="current">237</span>
                <span class="max">/280</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">PP</span>
                <span class="current">132</span>
                <span class="max">/235</span>
            </div>
        </fieldset>

        <fieldset class="earthbound-menu">
            <legend class="character-name">Jeff</legend>
            <div class="stat-box">
                <span class="stat-label">HP</span>
                <span class="current">037</span>
                <span class="max">/415</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">PP</span>
                <span class="current">000</span>
                <span class="max">/0</span>
            </div>
        </fieldset>

        <fieldset class="earthbound-menu">
            <legend class="character-name">Chris</legend>
            <div class="stat-box">
                <span class="stat-label">HP</span>
                <span class="current">198</span>
                <span class="max">/325</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">PP</span>
                <span class="current">105</span>
                <span class="max">/189</span>
            </div>
        </fieldset>

    </div>
</div>

IDEA FOR PROJECT:

Turn based RPG with team members. Each team member has a unique weapon and ability, and so do the enemies. The Players, and Enemies will have their own classes
to track what weapons they have, what hp they have, and to add functions to deal damage and to attack. Enemies moves will be random, like: using an attack,
healing a team member, or defending/shielding. There will be no art because I just want it to be a simple text game.
-->

</body>
</html>
